<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind VFX — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #4FA8D5; }

    /* Background: solid sky-blue gradient (replace with actual bg image) */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        180deg,
        #2d7fba 0%,
        #4FA8D5 30%,
        #7dc4e8 65%,
        #c4b5e8 100%
      );
    }

    /* Demo UI */
    .ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 12px;
      font-family: sans-serif;
    }
    .ui button {
      padding: 10px 22px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    .ui button:hover { background: rgba(255,255,255,0.35); }

    .label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      color: rgba(255,255,255,0.7);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <p class="label">🌬️ Wind VFX — Demo (replace .bg with your background image)</p>

  <div class="ui">
    <button onclick="windVFX.pause()">⏸ Pause</button>
    <button onclick="windVFX.resume()">▶ Resume</button>
  </div>

  <!-- Load the Wind VFX -->
  <script src="wind-vfx.js"></script>
</body>
</html>
