<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aritsia — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky1:#4a9fd4;--sky2:#7ec8e8;--sky3:#aaddee;--sky4:#cceeff;
  --gold:#e8c87a;--gold-d:#c8a040;--gold-l:#f5e0a0;
  --dark:#1a2a3a;--mid:#2c4a6a;--light:#e8f4fc;
  --white:rgba(255,255,255,0.88);--glass:rgba(255,255,255,0.45);
  --glass2:rgba(255,255,255,0.85);
  --pixel-shadow: 4px 4px 0 rgba(26,42,58,0.3);
}
html,body{min-height:100%;overflow-x:hidden}
body{
  font-family:'VT323', monospace;
  font-size: 20px;
  background:var(--sky2);
  min-height:100vh;position:relative;
}

/* ── Wind lines ── */
.wind-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.8}

/* ── Custom Background ── */
.custom-bg{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;opacity:0;transition:opacity 0.5s;pointer-events:none}

/* ── Page ── */
.page{
  position:relative;z-index:5;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:60px 20px 100px;
  gap:0;
}

/* ── Profile ── */
.profile-wrap{
  display:flex;flex-direction:column;align-items:center;
  animation:fadeUp .9s ease both;
  margin-bottom:36px;
}
.avatar-ring{
  width:140px;height:140px;
  background:var(--gold);
  padding:6px;margin-bottom:24px;
  box-shadow:var(--pixel-shadow);
  border:4px solid var(--dark);
}
.avatar-inner{
  width:100%;height:100%;overflow:hidden;
  background:linear-gradient(135deg,#a8d4f0,#c8eaf8,#90c4e8);
  display:flex;align-items:center;justify-content:center;
  font-size:58px;
  border:2px solid var(--dark);
}
.avatar-inner img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
.name{
  font-family:'Press Start 2P',cursive;font-size:32px;
  color:var(--dark);letter-spacing:2px;
  text-shadow:4px 4px 0 rgba(255,255,255,0.8);
  margin-bottom:18px;line-height:1;
  text-align:center;
}
.role-tag{
  font-size:22px;letter-spacing:1px;
  color:var(--dark);background:var(--white);
  border:3px solid var(--dark);
  padding:6px 16px;margin-bottom:28px;
  text-transform:uppercase;
  box-shadow:var(--pixel-shadow);
}

/* ── Social ── */
.social-links{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-bottom:52px;
  animation:fadeUp .9s .12s ease both;
}
.social-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;font-size:20px;
  text-decoration:none;
  border:3px solid var(--dark);
  background:var(--white);
  color:var(--dark);
  transition:transform .1s,background .1s,box-shadow .1s;
  box-shadow:4px 4px 0 var(--dark);
}
.social-btn:hover{transform:translate(2px,2px);background:var(--gold-l);box-shadow:2px 2px 0 var(--dark)}
.social-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--dark)}
.social-btn svg{width:20px;height:20px;flex-shrink:0}

/* ── Works section ── */
.works-section{
  width:100%;max-width:960px;
  animation:fadeUp .9s .28s ease both;
  background:var(--glass2);
  border:4px solid var(--dark);
  padding:30px;
  box-shadow:var(--pixel-shadow);
}
.section-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:24px;justify-content:center;
}
.s-line{flex:1;max-width:100px;height:4px;background:var(--dark)}
.s-title{font-family:'Press Start 2P',cursive;font-size:16px;color:var(--dark);text-transform:uppercase}

/* ── Filter ── */
.filter-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.filter-label{font-size:20px;color:var(--dark);margin-right:4px;white-space:nowrap}
.tab{
  font-family:'VT323', monospace;
  font-size:20px;
  padding:4px 14px;
  border:3px solid var(--dark);
  background:var(--white);color:var(--dark);
  cursor:pointer;transition:background .1s, transform .1s;
  white-space:nowrap;
  box-shadow:2px 2px 0 var(--dark);
}
.tab:hover{background:var(--gold-l);transform:translate(1px,1px);box-shadow:1px 1px 0 var(--dark)}
.tab.active{background:var(--gold);transform:translate(2px,2px);box-shadow:0 0 0 var(--dark)}
.subtab{font-size:18px;padding:2px 10px;background:var(--sky4)}
.subtab.active{background:var(--sky2)}
.sub-row{display:none;gap:8px;flex-wrap:wrap;justify-content:center}
.sub-row.visible{display:flex}

/* ── Gallery ── */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.work-card{
  border:3px solid var(--dark);
  background:var(--white);
  box-shadow:4px 4px 0 rgba(26,42,58,0.5);
  cursor:pointer;transition:transform .1s,box-shadow .1s;
}
.work-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(26,42,58,0.7);background:var(--gold-l)}
.work-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(26,42,58,0.7)}
.work-card.hidden{display:none}
.card-thumb{
  width:100%;aspect-ratio:16/10;
  background:#a8d4f0;
  border-bottom:3px solid var(--dark);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;overflow:hidden;position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;image-rendering:pixelated}
.card-info{padding:12px 14px}
.card-name{font-family:'Press Start 2P',cursive;font-size:12px;color:var(--dark);margin-bottom:10px;line-height:1.4}
.card-cats{display:flex;gap:6px;flex-wrap:wrap}
.cat-badge{
  font-size:16px;
  padding:2px 6px;
  background:var(--sky4);border:2px solid var(--dark);color:var(--dark);
}
.cat-badge.sub{background:var(--gold-l);}

/* ── Empty state ── */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:48px;color:var(--dark);font-size:22px;
}

/* ── Admin fixed ── */
.admin-fixed{position:fixed;bottom:24px;right:24px;z-index:20}
.admin-btn{
  width:52px;height:52px;
  background:var(--white);border:4px solid var(--dark);
  display:flex;align-items:center;justify-content:center;
  box-shadow:4px 4px 0 var(--dark);
  color:var(--dark);transition:all .1s;cursor:pointer;
}
.admin-btn:hover{background:var(--gold-l);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--dark)}
.admin-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--dark)}
.admin-btn svg{width:28px;height:28px}

@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(20,40,65,0.7);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  background:var(--white);
  border:4px solid var(--dark);
  width:calc(100vw - 40px);max-width:720px;max-height:90vh;overflow-y:auto;
  box-shadow:8px 8px 0 rgba(0,0,0,0.5);
  position:absolute;
  transform:scale(.97);transition:transform .2s;
  user-select:none;
}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-drag-bar{
  position:absolute;top:0;left:0;right:0;height:40px;
  cursor:grab;z-index:3;
  display:flex;align-items:center;justify-content:center;
  background:var(--dark);border-bottom:3px solid var(--dark);
}
.modal-drag-bar:active{cursor:grabbing}
.modal-drag-dot{width:100%;height:100%;display:flex;align-items:center;padding:0 12px;color:var(--white);font-size:16px}
.modal-close{
  position:absolute;top:4px;right:6px;
  background:var(--danger,#c0392b);border:3px solid var(--dark);
  width:32px;height:32px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--white);z-index:4;box-shadow:2px 2px 0 var(--dark);transition:transform .1s, box-shadow .1s;
}
.modal-close:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--dark)}
.modal-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;border-bottom:4px solid var(--dark);position:relative;cursor:ns-resize}
.modal-img{width:100%;height:100%;object-fit:cover;object-position:center 50%;display:block;transition:object-position .1s;image-rendering:pixelated}
.modal-img-placeholder{
  width:100%;aspect-ratio:16/9;
  background:#a8d4f0;
  border-bottom:4px solid var(--dark);
  display:flex;align-items:center;justify-content:center;font-size:64px;
}
.modal-viewer{
  width:100%;aspect-ratio:16/9;border-bottom:4px solid var(--dark);
  background:#1a2a3a;display:block;border-top:none;border-left:none;border-right:none;
}
.modal-body{padding:26px}
.modal-title{font-family:'Press Start 2P',cursive;font-size:18px;color:var(--dark);margin-bottom:12px;line-height:1.4}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.modal-desc{font-size:22px;color:var(--dark);line-height:1.5;margin-bottom:24px;white-space:pre-wrap}
.modal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;
  border:3px solid var(--dark);background:var(--gold);
  font-family:'VT323',monospace;font-size:24px;
  color:var(--dark);text-decoration:none;transition:all .1s;
  box-shadow:4px 4px 0 var(--dark);
}
.modal-link:hover{background:var(--gold-l);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--dark)}
.viewer-hint{font-size:18px;color:var(--dark);text-align:center;padding:12px 0 0;opacity:0.8}

</style>
</head>
<body>

<!-- Custom background -->
<div class="custom-bg" id="customBg"></div>

<!-- Wind/Pixel canvas -->
<canvas class="wind-canvas" id="windCanvas"></canvas>

<!-- Main -->
<main class="page">

  <!-- Profile -->
  <div class="profile-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner" id="avatarInner"></div>
    </div>
    <h1 class="name">ARITSIA</h1>
    <p class="role-tag">Game Dev · Minecraft Modder · 3D Artist</p>
  </div>

  <!-- Social -->
  <div class="social-links" id="socialLinksBox">
    <!-- Filled by JS -->
  </div>

  <!-- Works -->
  <section class="works-section">
    <div class="section-head">
      <div class="s-line"></div>
      <span class="s-title">Works</span>
      <div class="s-line r"></div>
    </div>

    <!-- Main category filter -->
    <div class="filter-wrap">
      <div class="filter-row" id="mainTabs">
        <span class="filter-label">Category:</span>
        <button class="tab active" data-cat="all" onclick="setMainCat('all',this)">All</button>
      </div>
      <!-- Sub-category row (shows only when 3D is selected) -->
      <div class="filter-row sub-row" id="subRow">
        <span class="filter-label">Type:</span>
      </div>
    </div>

    <!-- Gallery -->
    <div class="gallery" id="gallery">
      <div class="empty-state" id="emptyState" style="display:none">
        No works in this category yet.
      </div>
    </div>
  </section>
</main>

<!-- Admin fixed -->
<div class="admin-fixed">
  <a href="admin.html" class="admin-btn" title="Admin Panel">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
  </a>
</div>

<script>
// ── Pixel particles animation ──
const canvas = document.getElementById('windCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function randBetween(a, b) { return a + Math.random() * (b - a); }

function createParticle(yStart) {
  const size = Math.floor(randBetween(2, 6)) * 2; // pixel sizes
  return {
    x: Math.random() * W,
    y: yStart ?? H + size,
    size: size,
    speedY: randBetween(0.5, 2.5),
    speedX: randBetween(-0.5, 0.5),
    opacity: randBetween(0.1, 0.6)
  };
}

for (let i = 0; i < 40; i++) {
  particles.push(createParticle(Math.random() * H));
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.y -= p.speedY;
    p.x += p.speedX;
    
    ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
    
    if (p.y + p.size < 0) {
      particles[i] = createParticle();
    }
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Works data from GitHub ──
let works = [];
let settings = {};
let currentMainCat = 'all';
let currentSubCat = 'all';

const GH_USER = 'Aritsiaserlet';
const GH_REPO = 'aritsiaserlet';
const WORKS_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/works.json`;
const SETTINGS_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/settings.json`;

async function loadData() {
  // Load Works
  try {
    const r = await fetch(WORKS_URL + '?t=' + Date.now());
    if (r.ok) works = await r.json();
    else works = [];
  } catch(e) { works = []; }
  
  // Load Settings
  try {
    const sr = await fetch(SETTINGS_URL + '?t=' + Date.now());
    if (sr.ok) settings = await sr.json();
  } catch(e) { console.log('No settings found'); }
  
  applySettings();
  renderGallery();
}

function applySettings() {
  if (settings.profileImage) {
    document.getElementById('avatarInner').innerHTML = `<img src="${settings.profileImage}" alt="Profile">`;
  }
  if (settings.backgroundImage) {
    const bg = document.getElementById('customBg');
    bg.style.backgroundImage = `url('${settings.backgroundImage}')`;
    bg.style.opacity = '1';
    canvas.style.opacity = '0.4'; // Dim particles slightly when bg is loaded
  }

  // Render Social Links
  const socBox = document.getElementById('socialLinksBox');
  socBox.innerHTML = '';
  if(settings.socials && settings.socials.length > 0) {
    settings.socials.forEach(s => {
      let url = '';
      if(s.iconId && settings.icons) {
        const ic = settings.icons.find(x => x.id === s.iconId);
        if(ic) url = ic.url;
      } else if(s.icon) url = s.icon;
      const iconHtml = url ? `<img src="${url}" style="width:20px;height:20px;object-fit:cover;image-rendering:pixelated;">` : '';
      socBox.innerHTML += `<a href="${s.url}" class="social-btn" target="_blank" rel="noopener">${iconHtml} ${s.name}</a>`;
    });
  }

  // Render Filter Tabs
  const mainTabs = document.getElementById('mainTabs');
  mainTabs.innerHTML = `<span class="filter-label">Category:</span><button class="tab active" data-cat="all" onclick="setMainCat('all',this)">All</button>`;
  ['game','mod','3d'].forEach(id => {
    const c = settings.categories && settings.categories[id] ? settings.categories[id] : {};
    const name = c.name || (id==='game'?'Game':id==='mod'?'Minecraft Mod':'3D Model');
    let url = '';
    if(c.iconId && settings.icons) {
      const ic = settings.icons.find(x => x.id === c.iconId);
      if(ic) url = ic.url;
    } else if(c.icon) url = c.icon;
    const iconHtml = url ? `<img src="${url}" style="width:16px;height:16px;vertical-align:middle;image-rendering:pixelated;display:inline-block;margin-right:4px;">` : '';
    mainTabs.innerHTML += `<button class="tab" data-cat="${id}" onclick="setMainCat('${id}',this)">${iconHtml}${name}</button>`;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('emptyState');

  const filtered = works.filter(w => {
    if (currentMainCat !== 'all' && w.cat !== currentMainCat) return false;
    if (currentMainCat === '3d' && currentSubCat !== 'all' && w.subcat !== currentSubCat) return false;
    return true;
  });

  // Remove existing cards (keep emptyState)
  gallery.querySelectorAll('.work-card').forEach(c => c.remove());

  if (filtered.length === 0) {
    emptyState.style.display = '';
  } else {
    emptyState.style.display = 'none';
    filtered.forEach(w => {
      const card = document.createElement('div');
      card.className = 'work-card';
      card.onclick = () => openModal(w);
      const catSetting = settings.categories && settings.categories[w.cat] ? settings.categories[w.cat] : {};
      const catLabel = catSetting.name || ({game:'Game', mod:'Minecraft Mod', '3d':'3D Model'}[w.cat] || w.cat);
      
      let catIconUrl = '';
      if(catSetting.iconId && settings.icons) {
        const ic = settings.icons.find(x => x.id === catSetting.iconId);
        if(ic) catIconUrl = ic.url;
      } else if(catSetting.icon) catIconUrl = catSetting.icon;
      
      const catIcon = catIconUrl ? `<img src="${catIconUrl}" style="width:16px;height:16px;object-fit:cover;vertical-align:middle;display:inline-block;image-rendering:pixelated;margin-right:4px;">` : '';
      const subLabel = w.subcat ? w.subcat.charAt(0).toUpperCase() + w.subcat.slice(1) : '';
      const focalY = (w.imageFocal !== undefined && w.imageFocal !== null) ? w.imageFocal : 50;
      
      let toolsHtml = '';
      if(w.tools && w.tools.length > 0 && settings.icons) {
        w.tools.forEach(tid => {
          const ic = settings.icons.find(x => x.id === tid);
          if(ic) toolsHtml += `<img src="${ic.url}" title="${ic.name}" style="width:18px;height:18px;object-fit:cover;image-rendering:pixelated;border:2px solid var(--dark);background:var(--white);">`;
        });
      }

      card.innerHTML = `
        <div class="card-thumb">
          ${w.image ? `<img src="${w.image}" alt="${w.name}" style="object-position:center ${focalY}%">` : `<div style="font-size:48px;">${catIcon||'📁'}</div>`}
        </div>
        <div class="card-info">
          <p class="card-name">${w.name}</p>
          <div class="card-cats" style="align-items:center;">
            <span class="cat-badge">${catIcon}${catLabel}</span>
            ${subLabel ? `<span class="cat-badge sub">${subLabel}</span>` : ''}
            ${toolsHtml ? `<div style="display:flex;gap:4px;margin-left:auto;">${toolsHtml}</div>` : ''}
          </div>
        </div>`;
      gallery.appendChild(card);
    });
  }
}

function setMainCat(cat, btn) {
  currentMainCat = cat;
  currentSubCat = 'all';
  document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const subRow = document.getElementById('subRow');
  if (cat !== 'all') {
    subRow.classList.add('visible');
    let subOptions = [];
    if (cat === 'game') subOptions = ['RPG', 'Action', 'Puzzle', 'Visual Novel', 'Platformer', 'Other'];
    if (cat === 'mod') subOptions = ['Client-side', 'Server-side', 'Content', 'Utility', 'Other'];
    if (cat === '3d') subOptions = ['Character', 'Building', 'Object', 'Creature', 'Other'];
    
    subRow.innerHTML = `<span class="filter-label">Type:</span><button class="tab subtab active" data-sub="all" onclick="setSubCat('all',this)">All</button>`;
    subOptions.forEach(opt => {
      subRow.innerHTML += `<button class="tab subtab" data-sub="${opt.toLowerCase()}" onclick="setSubCat('${opt.toLowerCase()}',this)">${opt}</button>`;
    });
  } else {
    subRow.classList.remove('visible');
  }
  renderGallery();
}

function setSubCat(sub, btn) {
  currentSubCat = sub;
  document.querySelectorAll('#subRow .subtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

loadData();

// ── Modal ──
function openModal(w) {
  const catSetting = settings.categories && settings.categories[w.cat] ? settings.categories[w.cat] : {};
  const catLabel = catSetting.name || ({game:'Game', mod:'Minecraft Mod', '3d':'3D Model'}[w.cat] || w.cat);
  
  let catIconUrl = '';
  if(catSetting.iconId && settings.icons) {
    const ic = settings.icons.find(x => x.id === catSetting.iconId);
    if(ic) catIconUrl = ic.url;
  } else if(catSetting.icon) catIconUrl = catSetting.icon;
  
  const catIcon = catIconUrl ? `<img src="${catIconUrl}" style="width:16px;height:16px;object-fit:cover;vertical-align:middle;display:inline-block;image-rendering:pixelated;margin-right:4px;">` : '';
  const subLabel = w.subcat ? w.subcat.charAt(0).toUpperCase() + w.subcat.slice(1) : '';

  // Media area
  const media = document.getElementById('modalMedia');
  if (w.cat === '3d' && w.model) {
    media.innerHTML = '<canvas class="modal-viewer" id="threeCanvas"></canvas><p class="viewer-hint">🖱 Drag = Rotate &nbsp;·&nbsp; Shift+Drag = Pan &nbsp;·&nbsp; Scroll = Zoom</p>';
    setTimeout(() => initThreeViewer(w.model), 80);
  } else if (w.image) {
    media.innerHTML = `<div class="modal-img-wrap" id="imgWrap"><img class="modal-img" id="modalImgEl" src="${w.image}" alt="${w.name}" style="object-position:center ${w.imageFocal||50}%"></div><p class="viewer-hint">↕ Drag image up/down to adjust</p>`;
    initImgDrag();
  } else {
    media.innerHTML = `<div class="modal-img-placeholder">${catIcon||'📁'}</div>`;
  }

  document.getElementById('modalTitle').textContent = w.name;
  document.getElementById('modalDesc').textContent = w.desc || '';

  let toolsHtml = '';
  if(w.tools && w.tools.length > 0 && settings.icons) {
    w.tools.forEach(tid => {
      const ic = settings.icons.find(x => x.id === tid);
      if(ic) toolsHtml += `<img src="${ic.url}" title="${ic.name}" style="width:24px;height:24px;object-fit:cover;image-rendering:pixelated;border:2px solid var(--dark);background:var(--white);">`;
    });
  }

  const badges = document.getElementById('modalBadges');
  badges.innerHTML = `<span class="cat-badge">${catIcon}${catLabel}</span>`;
  if (subLabel) badges.innerHTML += `<span class="cat-badge sub">${subLabel}</span>`;
  if (toolsHtml) badges.innerHTML += `<div style="display:flex;gap:6px;align-items:center;margin-left:8px;padding-left:8px;border-left:3px solid var(--dark);">${toolsHtml}</div>`;

  const link = document.getElementById('modalLink');
  if (w.link) { link.href = w.link; link.style.display = 'inline-flex'; }
  else link.style.display = 'none';

  // Center modal
  const box = document.getElementById('modalBox');
  const vw = window.innerWidth, vh = window.innerHeight;
  box.style.left = Math.max(0, (vw - Math.min(720, vw-40))/2) + 'px';
  box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Re-center after render
  requestAnimationFrame(() => {
    box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';
  });
}

// ── Image focal drag ──
function initImgDrag() {
  const wrap = document.getElementById('imgWrap');
  const img = document.getElementById('modalImgEl');
  if (!wrap || !img) return;
  let dragging = false, startY = 0, posY = 50;
  wrap.addEventListener('mousedown', e => { dragging=true; startY=e.clientY; e.preventDefault(); });
  wrap.addEventListener('touchstart', e => { dragging=true; startY=e.touches[0].clientY; }, {passive:true});
  window.addEventListener('mouseup', () => dragging=false);
  window.addEventListener('touchend', () => dragging=false);
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.clientY - startY) * 0.3));
    startY = e.clientY;
    img.style.objectPosition = `center ${posY}%`;
  });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.touches[0].clientY - startY) * 0.3));
    startY = e.touches[0].clientY;
    img.style.objectPosition = `center ${posY}%`;
  }, {passive:true});
}

// ── Modal drag ──
(function() {
  let dragging=false, ox=0, oy=0;
  document.addEventListener('mousedown', e => {
    const bar = document.getElementById('modalDragBar');
    if (!bar || !bar.contains(e.target)) return;
    dragging=true;
    const box=document.getElementById('modalBox');
    ox=e.clientX-box.offsetLeft; oy=e.clientY-box.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('touchstart', e => {
    const bar = document.getElementById('modalDragBar');
    if (!bar || !bar.contains(e.target)) return;
    dragging=true;
    const box=document.getElementById('modalBox');
    ox=e.touches[0].clientX-box.offsetLeft; oy=e.touches[0].clientY-box.offsetTop;
  }, {passive:true});
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const box=document.getElementById('modalBox');
    const maxX=window.innerWidth-box.offsetWidth, maxY=window.innerHeight-60;
    box.style.left=Math.max(0,Math.min(maxX,e.clientX-ox))+'px';
    box.style.top=Math.max(0,Math.min(maxY,e.clientY-oy))+'px';
  });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const box=document.getElementById('modalBox');
    const maxX=window.innerWidth-box.offsetWidth, maxY=window.innerHeight-60;
    box.style.left=Math.max(0,Math.min(maxX,e.touches[0].clientX-ox))+'px';
    box.style.top=Math.max(0,Math.min(maxY,e.touches[0].clientY-oy))+'px';
  }, {passive:true});
  document.addEventListener('mouseup', () => dragging=false);
  document.addEventListener('touchend', () => dragging=false);
})();

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  disposeThreeViewer();
  document.getElementById('modalMedia').innerHTML = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModalDirect(); });

// ── Three.js 3D Viewer ──
let threeRenderer=null, threeAnimId=null;
function initThreeViewer(modelUrl) {
  const canvas = document.getElementById('threeCanvas');
  if (!canvas || typeof THREE === 'undefined') return;

  const W = canvas.clientWidth, H = canvas.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2a3a);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 1000);
  camera.position.set(0, 1.5, 4);

  threeRenderer = new THREE.WebGLRenderer({canvas, antialias:true});
  threeRenderer.setSize(W, H);
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(3,5,3); scene.add(dir);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
  fill.position.set(-3,0,-3); scene.add(fill);

  // Orbit + Pan controls
  let isDragging=false, prevX=0, prevY=0;
  let rotX=0, rotY=0, zoom=4;
  let panX=0, panY=0;  // camera pan offset
  const group = new THREE.Group(); scene.add(group);

  canvas.addEventListener('mousedown', e=>{
    isDragging=true; prevX=e.clientX; prevY=e.clientY;
    e.preventDefault();
  });
  canvas.addEventListener('touchstart', e=>{
    isDragging=true;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('mouseup', ()=>isDragging=false);
  window.addEventListener('touchend', ()=>isDragging=false);

  canvas.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    const dx=e.clientX-prevX, dy=e.clientY-prevY;
    if(e.shiftKey){
      // Pan: move camera target
      panX -= dx * 0.005 * (zoom/4);
      panY += dy * 0.005 * (zoom/4);
    } else {
      // Rotate
      rotY += dx * 0.012;
      rotX += dy * 0.012;
      rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    }
    prevX=e.clientX; prevY=e.clientY;
  });

  canvas.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    // Two-finger = pan, one-finger = rotate
    if(e.touches.length===2){
      panX -= dx*0.005; panY += dy*0.005;
    } else {
      rotY+=dx*0.012; rotX+=dy*0.012;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    }
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});

  canvas.addEventListener('wheel', e=>{
    zoom=Math.max(1,Math.min(16,zoom+e.deltaY*0.008));
    e.preventDefault();
  },{passive:false});

  // Load GLB
  const loader = new THREE.FileLoader();
  loader.setResponseType('arraybuffer');
  // Use GLTFLoader via dynamic import or inline parse
  // Fallback: load script then parse
  const script = document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(modelUrl, gltf => {
      const model = gltf.scene;
      // Auto-center and scale
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.5 / maxDim;
      model.scale.setScalar(scale);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center.multiplyScalar(scale));
      group.add(model);
    }, undefined, err => {
      console.warn('GLB load error:', err);
      // Show placeholder cube if model fails
      const geo = new THREE.BoxGeometry(1.5,1.5,1.5);
      const mat = new THREE.MeshStandardMaterial({color:0x4a9fd4,roughness:.4,metalness:.3});
      group.add(new THREE.Mesh(geo,mat));
    });
  };
  document.head.appendChild(script);

  let autoRotY = 0;
  function animate(){
    threeAnimId = requestAnimationFrame(animate);
    // Auto-slow rotate when not dragging
    if(!isDragging) autoRotY += 0.004;
    group.rotation.x = rotX;
    group.rotation.y = rotY + autoRotY;
    // Apply pan to camera
    camera.position.set(panX, 1.5 + panY, zoom);
    camera.lookAt(panX, panY, 0);
    threeRenderer.render(scene, camera);
  }
  animate();
}

function disposeThreeViewer(){
  if(threeAnimId){ cancelAnimationFrame(threeAnimId); threeAnimId=null; }
  if(threeRenderer){ threeRenderer.dispose(); threeRenderer=null; }
}

</script>
