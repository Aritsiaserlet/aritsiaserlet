<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aritsia — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky1:#4a9fd4;--sky2:#7ec8e8;--sky3:#aaddee;--sky4:#cceeff;
  --gold:#e8c87a;--gold-d:#c8a040;--gold-l:#f5e0a0;
  --dark:#1a2a3a;--mid:#2c4a6a;--light:#e8f4fc;
  --white:rgba(255,255,255,0.88);--glass:rgba(255,255,255,0.45);
  --glass2:rgba(255,255,255,0.85);
  --pixel-shadow: 4px 4px 0 rgba(26,42,58,0.3);
}
html,body{min-height:100%;overflow-x:hidden}
body{
  font-family:'VT323', monospace;
  font-size: 20px;
  background:var(--sky2);
  min-height:100vh;position:relative;
}

/* ── Wind lines ── */
.wind-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.8}

/* ── Custom Background ── */
.custom-bg{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;opacity:0;transition:opacity 0.5s;pointer-events:none}

/* ── Page ── */
.page{
  position:relative;z-index:5;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:60px 20px 100px;
  gap:0;
}

/* ── Profile ── */
.profile-wrap{
  display:flex;flex-direction:column;align-items:center;
  animation:fadeUp .9s ease both;
  margin-bottom:36px;
}
.avatar-ring{
  width:140px;height:140px;
  background:var(--gold);
  padding:6px;margin-bottom:24px;
  box-shadow:var(--pixel-shadow);
  border:4px solid var(--dark);
}
.avatar-inner{
  width:100%;height:100%;overflow:hidden;
  background:linear-gradient(135deg,#a8d4f0,#c8eaf8,#90c4e8);
  display:flex;align-items:center;justify-content:center;
  font-size:58px;
  border:2px solid var(--dark);
}
.avatar-inner img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
.name{
  font-family:'Press Start 2P',cursive;font-size:32px;
  color:var(--dark);letter-spacing:2px;
  text-shadow:4px 4px 0 rgba(255,255,255,0.8);
  margin-bottom:18px;line-height:1;
  text-align:center;
}
.role-tag{
  font-size:22px;letter-spacing:1px;
  color:var(--dark);background:var(--white);
  border:3px solid var(--dark);
  padding:6px 16px;margin-bottom:28px;
  text-transform:uppercase;
  box-shadow:var(--pixel-shadow);
}

/* ── Social ── */
.social-links{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-bottom:52px;
  animation:fadeUp .9s .12s ease both;
}
.social-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;font-size:20px;
  text-decoration:none;
  border:3px solid var(--dark);
  background:var(--white);
  color:var(--dark);
  transition:transform .1s,background .1s,box-shadow .1s;
  box-shadow:4px 4px 0 var(--dark);
}
.social-btn:hover{transform:translate(2px,2px);background:var(--gold-l);box-shadow:2px 2px 0 var(--dark)}
.social-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--dark)}
.social-btn svg{width:20px;height:20px;flex-shrink:0}

/* ── Works section ── */
.works-section{
  width:100%;max-width:960px;
  animation:fadeUp .9s .28s ease both;
  background:var(--glass2);
  border:4px solid var(--dark);
  padding:30px;
  box-shadow:var(--pixel-shadow);
}
.section-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:24px;justify-content:center;
}
.s-line{flex:1;max-width:100px;height:4px;background:var(--dark)}
.s-title{font-family:'Press Start 2P',cursive;font-size:16px;color:var(--dark);text-transform:uppercase}

/* ── Filter ── */
.filter-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.filter-label{font-size:20px;color:var(--dark);margin-right:4px;white-space:nowrap}
.tab{
  font-family:'VT323', monospace;
  font-size:20px;
  padding:4px 14px;
  border:3px solid var(--dark);
  background:var(--white);color:var(--dark);
  cursor:pointer;transition:background .1s, transform .1s;
  white-space:nowrap;
  box-shadow:2px 2px 0 var(--dark);
  display:inline-flex;align-items:center;gap:6px;
}
.tab:hover{background:var(--gold-l);transform:translate(1px,1px);box-shadow:1px 1px 0 var(--dark)}
.tab.active{background:var(--gold);transform:translate(2px,2px);box-shadow:0 0 0 var(--dark)}
.subtab{font-size:18px;padding:2px 10px;background:var(--sky4)}
.subtab.active{background:var(--sky2)}
.sub-row{display:none;gap:8px;flex-wrap:wrap;justify-content:center}
.sub-row.visible{display:flex}

/* ── Gallery ── */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.work-card{
  border:3px solid var(--dark);
  background:var(--white);
  box-shadow:4px 4px 0 rgba(26,42,58,0.5);
  cursor:pointer;transition:transform .1s,box-shadow .1s;
}
.work-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 rgba(26,42,58,0.7);background:var(--gold-l)}
.work-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(26,42,58,0.7)}
.work-card.hidden{display:none}
.card-thumb{
  width:100%;aspect-ratio:16/10;
  background:#a8d4f0;
  border-bottom:3px solid var(--dark);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;overflow:hidden;position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;image-rendering:pixelated}
.like-btn{
  position:absolute; top:8px; right:8px; z-index:5;
  background:var(--white); border:3px solid var(--dark); box-shadow:2px 2px 0 var(--dark);
  display:flex; align-items:center; gap:6px; padding:2px 6px;
  cursor:pointer; transition:transform 0.1s;
}
.like-btn:hover{ transform:translate(-1px,-1px); }
.like-btn:active{ transform:translate(1px,1px); box-shadow:0 0 0 var(--dark); }
.like-btn svg{ width:20px; height:20px; }
.card-info{padding:12px 14px}
.card-name{font-family:'Press Start 2P',cursive;font-size:12px;color:var(--dark);margin-bottom:10px;line-height:1.4}
.card-cats{display:flex;gap:6px;flex-wrap:wrap}
.cat-badge{
  font-size:16px;
  padding:4px 8px;
  background:var(--sky4);border:2px solid var(--dark);color:var(--dark);
  display:inline-flex;align-items:center;gap:6px;
}
.cat-badge.sub{background:var(--gold-l);}

/* ── Empty state ── */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:48px;color:var(--dark);font-size:22px;
}

/* ── Admin fixed ── */
.admin-fixed{position:fixed;bottom:24px;right:24px;z-index:20}
.admin-btn{
  width:52px;height:52px;
  background:var(--white);border:4px solid var(--dark);
  display:flex;align-items:center;justify-content:center;
  box-shadow:4px 4px 0 var(--dark);
  color:var(--dark);transition:all .1s;cursor:pointer;
}
.admin-btn:hover{background:var(--gold-l);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--dark)}
.admin-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--dark)}
.admin-btn svg{width:28px;height:28px}

@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(20,40,65,0.7);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  position:absolute;
  background:var(--white);
  border:4px solid var(--dark);
  width:calc(100vw - 40px);max-width:720px;max-height:90vh;overflow-y:auto;
  box-shadow:8px 8px 0 rgba(0,0,0,0.5);
  transform:scale(.97);transition:transform .2s;
  user-select:none;
}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-drag-bar{
  position:absolute;top:0;left:0;right:0;height:40px;
  cursor:grab;z-index:3;
  display:flex;align-items:center;justify-content:center;
  background:var(--dark);border-bottom:3px solid var(--dark);
}
.modal-drag-bar:active{cursor:grabbing}
.modal-drag-dot{width:100%;height:100%;display:flex;align-items:center;padding:0 12px;color:var(--white);font-size:16px}
.modal-close{
  position:absolute;top:4px;right:6px;
  background:var(--danger,#c0392b);border:3px solid var(--dark);
  width:32px;height:32px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--white);z-index:4;box-shadow:2px 2px 0 var(--dark);transition:transform .1s, box-shadow .1s;
}
.modal-close:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--dark)}
.modal-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;border-bottom:4px solid var(--dark);position:relative;cursor:ns-resize}
.modal-img{width:100%;height:100%;object-fit:cover;object-position:center 50%;display:block;transition:object-position .1s;image-rendering:pixelated}
.modal-img-placeholder{
  width:100%;aspect-ratio:16/9;
  background:#a8d4f0;
  border-bottom:4px solid var(--dark);
  display:flex;align-items:center;justify-content:center;font-size:64px;
}
.modal-viewer{
  width:100%;aspect-ratio:16/9;border-bottom:4px solid var(--dark);
  background:#1a2a3a;display:block;border-top:none;border-left:none;border-right:none;
}
.modal-body{padding:26px}
.modal-title{font-family:'Press Start 2P',cursive;font-size:18px;color:var(--dark);margin-bottom:12px;line-height:1.4}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.modal-desc{font-size:22px;color:var(--dark);line-height:1.5;margin-bottom:24px;white-space:pre-wrap}
.modal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;
  border:3px solid var(--dark);background:var(--gold);
  font-family:'VT323',monospace;font-size:24px;
  color:var(--dark);text-decoration:none;transition:all .1s;
  box-shadow:4px 4px 0 var(--dark);
}
.modal-link:hover{background:var(--gold-l);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--dark)}
.viewer-hint{font-size:18px;color:var(--dark);text-align:center;padding:12px 0 0;opacity:0.8}

/* ── Settings Modal ── */
.settings-modal {
  position:fixed;inset:0;z-index:150;
  background:rgba(20,40,65,0.8);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.settings-modal.open {opacity:1;pointer-events:all;}
.settings-box {
  background:var(--white);
  border:4px solid var(--dark);
  width:calc(100vw - 40px);max-width:500px;
  box-shadow:8px 8px 0 rgba(0,0,0,0.5);
  padding:24px;
}
.settings-title {font-family:'Press Start 2P',cursive;font-size:16px;color:var(--dark);margin-bottom:20px;text-align:center;border-bottom:3px solid var(--dark);padding-bottom:12px;}
.set-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.set-label { font-family:'VT323',monospace; font-size:24px; color:var(--dark); width: 140px; flex-shrink: 0; }
.set-select, .set-range {
  font-family:'VT323',monospace;font-size:20px;
  border:3px solid var(--dark);background:var(--sky4);
  padding:4px 8px;color:var(--dark);outline:none;
}
.set-select:focus {background:var(--gold-l);}
.set-range { flex:1; max-width:200px; accent-color:var(--danger); }

/* ── Top Nav (Auth & Leaderboard) ── */
.top-nav {
  position:absolute; top:20px; right:20px; z-index:10;
  display:flex; gap:12px; align-items:center;
}
.nav-btn {
  font-family:'VT323',monospace; font-size:18px;
  background:var(--white); color:var(--dark);
  border:3px solid var(--dark); padding:6px 12px;
  box-shadow:3px 3px 0 var(--dark); cursor:pointer;
  transition:all 0.1s; display:inline-flex; align-items:center; gap:6px;
}
.nav-btn:hover { background:var(--gold-l); transform:translate(2px,2px); box-shadow:1px 1px 0 var(--dark); }
.user-profile {
  display:none; align-items:center; gap:8px;
  background:var(--glass2); border:3px solid var(--dark);
  padding:4px 12px 4px 4px; box-shadow:3px 3px 0 var(--dark);
}
.user-avatar { width:32px; height:32px; border:2px solid var(--dark); object-fit:cover; image-rendering:pixelated; }
.user-name { font-family:'Press Start 2P',cursive; font-size:10px; color:var(--dark); }

/* ── Leaderboard Modal ── */
.leaderboard-modal {
  position:fixed;inset:0;z-index:150;
  background:rgba(20,40,65,0.8);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.leaderboard-modal.open {opacity:1;pointer-events:all;}
.leaderboard-box {
  background:var(--white); border:4px solid var(--dark);
  width:calc(100vw - 40px); max-width:600px;
  box-shadow:8px 8px 0 rgba(0,0,0,0.5); padding:24px;
  max-height:80vh; overflow-y:auto;
}
.leaderboard-title {
  font-family:'Press Start 2P',cursive; font-size:18px; color:var(--dark);
  margin-bottom:20px; text-align:center; border-bottom:3px solid var(--dark); padding-bottom:12px;
}
.leaderboard-list { display:flex; flex-direction:column; gap:8px; }
.leaderboard-item {
  display:flex; align-items:center; gap:12px;
  padding:8px 12px; border:3px solid var(--dark); background:var(--sky4);
}
.leaderboard-item.top3 { background:var(--gold-l); }
.lb-rank { font-family:'Press Start 2P',cursive; font-size:14px; width:30px; text-align:center; }
.lb-avatar { width:36px; height:36px; border:2px solid var(--dark); object-fit:cover; image-rendering:pixelated; }
.lb-name { flex:1; font-family:'VT323',monospace; font-size:24px; }
.lb-score { font-family:'VT323',monospace; font-size:24px; color:var(--danger); }

.team-popup {
  position: absolute; left: calc(100% + 20px); top: 0; width: 300px;
  background: var(--white); border: 4px solid var(--dark); padding: 20px;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
  display: none; flex-direction: column; z-index: 100;
}
@media(max-width: 768px) {
  .team-popup {
    left: 0; top: 100%; margin-top: 20px; width: 100%; box-sizing: border-box;
  }
}
</style>
<script type="module">
  import { initSettings, getSettings, updateSettings } from './settingsManager.js';
  import { loginWithGoogle, logout, onUserChange, db, fetchLikeCounts, fetchUserLikes, toggleLike } from './authManager.js';
  import { sfxLike, sfxLogin, startBGM, stopBGM, toggleBGM, togglePortfolioBGM as _togglePortfolioBGM, setVolumes, loadSoundAssignments, toggleMute } from './audioManager.js';
  
  window.portfolioSettingsManager = { getSettings, updateSettings };
  window.portfolioAudioManager = { startBGM, stopBGM, toggleBGM, setVolumes, togglePortfolioBGM: _togglePortfolioBGM, toggleMute };
  window.portfolioAuthManager = { 
    login: loginWithGoogle, 
    logout: logout, 
    toggleLike: toggleLike 
  };

  // Setup Auth UI binding
  window.addEventListener('DOMContentLoaded', async () => {
    const loginBtn = document.getElementById('loginBtn');
    const userProfile = document.getElementById('userProfile');
    const userName = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');

    // Fetch global likes once
    window.globalLikes = await fetchLikeCounts();
    if (window.renderGallery) window.renderGallery();

    onUserChange(async user => {
      window.currentUser = user;
      if (user) {
        loginBtn.style.display = 'none';
        userProfile.style.display = 'flex';
        userName.textContent = user.displayName || 'Player';
        userAvatar.src = user.photoURL || '';
        // Fetch user's likes
        window.userLikes = await fetchUserLikes(user.uid);
        sfxLogin(); // Play login chime
      } else {
        loginBtn.style.display = 'inline-flex';
        userProfile.style.display = 'none';
        window.userLikes = {};
      }
      if (window.renderGallery) window.renderGallery();
    });

    // Load sound assignments from settings.json
    await loadSoundAssignments();

    // Sync initial audio volumes from settings
    const initSet = getSettings();
    setVolumes({
      master: initSet.masterVolume,
      music:  initSet.musicVolume,
      sfx:    initSet.sfxVolume,
      mute:   initSet.mute
    });
    if(window.initSoundBtns) window.initSoundBtns();
  }
);

  window.handleLikeClick = async (e, workId) => {
    if (e) e.stopPropagation();
    if (!window.currentUser) {
      document.getElementById('loginPromptModal').style.display = 'flex';
      return;
    }
    const isLiking = !window.userLikes[workId];
    const btn = e ? e.currentTarget : document.getElementById('modalLikeBtn');
    const span = btn ? btn.querySelector('span') : null;
    
    // Optimistic UI Update
    if (isLiking) {
      window.userLikes[workId] = true;
      window.globalLikes[workId] = (window.globalLikes[workId] || 0) + 1;
      btn.style.color = 'var(--danger)';
      btn.querySelector('svg').style.fill = 'currentColor';
    } else {
      delete window.userLikes[workId];
      window.globalLikes[workId] = Math.max(0, (window.globalLikes[workId] || 0) - 1);
      btn.style.color = 'var(--dark)';
      btn.querySelector('svg').style.fill = 'none';
    }
    span.textContent = window.globalLikes[workId];
    
    sfxLike(); // Play like SFX
    const success = await window.portfolioAuthManager.toggleLike(workId, isLiking);
    if (!success) {
      // Revert if failed
      if (isLiking) { delete window.userLikes[workId]; window.globalLikes[workId]--; }
      else { window.userLikes[workId] = true; window.globalLikes[workId]++; }
      if (window.renderGallery) window.renderGallery();
      if (window.currentModalWorkId === workId && window.updateModalLikeBtn) window.updateModalLikeBtn();
    }
  };

  window.updateModalLikeBtn = () => {
    const wId = window.currentModalWorkId;
    if (!wId) return;
    const likesCount = (window.globalLikes && window.globalLikes[wId]) ? window.globalLikes[wId] : 0;
    const isLiked = (window.userLikes && window.userLikes[wId]) ? true : false;
    const heartFill = isLiked ? 'currentColor' : 'none';
    const heartColor = isLiked ? 'var(--danger)' : 'var(--dark)';
    const btn = document.getElementById('modalLikeBtn');
    if (btn) {
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${heartFill}"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span style="font-family:'VT323',monospace;font-size:24px;margin-top:2px;">${likesCount}</span>
      `;
      btn.style.color = heartColor;
    }
  };
</script>
</head>
<body>

<!-- Top Navigation -->
<div class="top-nav" style="justify-content: flex-end;">
  <button class="nav-btn" onclick="openSettingsModal()" style="font-size: 24px; padding: 4px 8px; margin: 0; display: flex; align-items: center; height: 44px;">⚙</button>
</div>

<!-- Custom background -->
<div class="custom-bg" id="customBg"></div>

<!-- Wind/Pixel canvas -->
<canvas class="wind-canvas" id="windCanvas"></canvas>

<!-- Main -->
<main class="page">

  <!-- Profile -->
  <div class="profile-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner" id="avatarInner"></div>
    </div>
    <h1 class="name">ARITSIA</h1>
    <p class="role-tag">Game Dev · Minecraft Modder · 3D Artist</p>
    <button id="playGameBtn" onclick="startGame()" style="
      font-family:'Press Start 2P',cursive; font-size:18px; color:var(--dark);
      background:var(--gold); border:4px solid var(--dark); padding:16px 24px;
      margin-bottom:32px; cursor:pointer; box-shadow:6px 6px 0 var(--dark);
      transition:transform 0.1s, box-shadow 0.1s; animation:fadeUp 0.9s 0.2s ease both;
      display:inline-flex; align-items:center; gap:12px;
    " onmouseover="this.style.transform='translate(2px,2px)'; this.style.boxShadow='4px 4px 0 var(--dark)';" 
       onmouseout="this.style.transform='none'; this.style.boxShadow='6px 6px 0 var(--dark)';"
       onmousedown="this.style.transform='translate(6px,6px)'; this.style.boxShadow='0 0 0 var(--dark)';">
       ▶ PLAY MINIGAME
    </button>
  </div>

  <!-- Social -->
  <div class="social-links" id="socialLinksBox">
    <!-- Filled by JS -->
  </div>

  <!-- Works -->
  <section class="works-section">
    <div class="section-head">
      <div class="s-line"></div>
      <span class="s-title">Works</span>
      <div class="s-line r"></div>
    </div>

    <!-- Main category filter -->
    <div class="filter-wrap">
      <div class="filter-row" style="justify-content:space-between;">
        <div id="mainTabs" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span class="filter-label">Category:</span>
          <button class="tab active" data-cat="all" onclick="setMainCat('all',this)">All</button>
        </div>

// ── Pixel particles animation ──
const canvas = document.getElementById('windCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function randBetween(a, b) { return a + Math.random() * (b - a); }

function createParticle(yStart) {
  return {
    x: Math.floor(Math.random() * W),
    y: yStart ?? Math.floor(H + 100),
    length: Math.floor(randBetween(6, 25)) * 6,
    speedY: randBetween(1.5, 5.0),
    phase: Math.random() * Math.PI * 2,
    opacity: randBetween(0.1, 0.6)
  };
}

for (let i = 0; i < 40; i++) {
  particles.push(createParticle(Math.random() * H));
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.y -= p.speedY;
    
    let currentY = p.y;
    let segCount = Math.floor(p.length / 6);
    for (let j=0; j<segCount; j++) {
      let alpha = p.opacity * (1 - j/segCount); // fade out tail
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      let waveX = Math.floor(Math.sin(currentY * 0.015 + p.phase) * 8);
      ctx.fillRect(Math.floor(p.x + waveX), Math.floor(currentY), 4, 4);
      currentY += 6;
    }
    
    if (p.y + p.length < 0) {
      particles[i] = createParticle();
    }
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── Works data from GitHub ──
let works = [];
let settings = {};
let currentMainCat = 'all';
let currentSubCat = 'all';
let currentSort = 'featured'; // Default sort

const GH_USER = 'Aritsiaserlet';
const GH_REPO = 'aritsiaserlet';
const WORKS_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/works.json`;
const SETTINGS_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/settings.json`;

async function loadData() {
  const t = sessionStorage.getItem('ghToken');
  // Load Works
  try {
    let r;
    if (t) {
      r = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/works.json?ref=main&t=`+Date.now(), { headers: { 'Authorization': `token ${t}`, 'Accept': 'application/vnd.github.v3.raw' } });
      if (!r.ok) r = await fetch(WORKS_URL + '?t=' + Date.now());
    } else {
      r = await fetch(WORKS_URL + '?t=' + Date.now());
    }
    if (r.ok) works = await r.json();
    else works = [];
  } catch(e) { works = []; }
  
  // Load Settings
  try {
    let sr;
    if (t) {
      sr = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/settings.json?ref=main&t=`+Date.now(), { headers: { 'Authorization': `token ${t}`, 'Accept': 'application/vnd.github.v3.raw' } });
      if (!sr.ok) sr = await fetch(SETTINGS_URL + '?t=' + Date.now());
    } else {
      sr = await fetch(SETTINGS_URL + '?t=' + Date.now());
    }
    if (sr.ok) {
      settings = await sr.json();
      if(window.portfolioSettingsManager) window.portfolioSettingsManager.updateSettings(settings);
    }
  } catch(e) { console.log('No settings found'); }
  
  applySettings();
  renderGallery();
  if(window.initSoundBtns) window.initSoundBtns();
}

function applySettings() {
  if (settings.profileImage) {
    document.getElementById('avatarInner').innerHTML = `<img src="${settings.profileImage}" alt="Profile">`;
  }
  if (settings.backgroundImage) {
    const bg = document.getElementById('customBg');
    bg.style.backgroundImage = `url('${settings.backgroundImage}')`;
    bg.style.opacity = '1';
    canvas.style.opacity = '0.4'; // Dim particles slightly when bg is loaded
  }

  // Render Social Links
  const socBox = document.getElementById('socialLinksBox');
  socBox.innerHTML = '';
  if(settings.socials && settings.socials.length > 0) {
    settings.socials.forEach(s => {
      let url = '';
      if(s.iconId && settings.icons) {
        const ic = settings.icons.find(x => x.id === s.iconId);
        if(ic) url = ic.url;
      }
      const iconHtml = url ? `<img src="${url}" style="width:20px;height:20px;object-fit:cover;image-rendering:pixelated;">` : '';
      socBox.innerHTML += `<a href="${s.url}" class="social-btn" target="_blank" rel="noopener">${iconHtml} ${s.name}</a>`;
    });
  }

  // Render Filter Tabs
  const mainTabs = document.getElementById('mainTabs');
  mainTabs.innerHTML = `<span class="filter-label">Category:</span><button class="tab active" data-cat="all" onclick="setMainCat('all',this)">All</button>`;
  ['game','mod','3d'].forEach(id => {
    const c = settings.categories && settings.categories[id] ? settings.categories[id] : {};
    const name = c.name || (id==='game'?'Game':id==='mod'?'Minecraft Mod':'3D Model');
    let url = '';
    if(c.iconId && settings.icons) {
      const ic = settings.icons.find(x => x.id === c.iconId);
      if(ic) url = ic.url;
    }
    const iconHtml = url ? `<img src="${url}" style="width:20px;height:20px;object-fit:contain;image-rendering:pixelated;">` : '';
    mainTabs.innerHTML += `<button class="tab" data-cat="${id}" onclick="setMainCat('${id}',this)">${iconHtml}${name}</button>`;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('emptyState');

  let filtered = works.filter(w => {
    if (currentMainCat !== 'all' && w.cat !== currentMainCat) return false;
    if (currentMainCat === '3d' && currentSubCat !== 'all' && w.subcat !== currentSubCat) return false;
    return true;
  });

  // Sorting Logic
  filtered.sort((a, b) => {
    if (currentSort === 'random') {
      // Very simple deterministic shuffle based on length (just for visual variation on load)
      // Actual random sort on every re-render is annoying, so we use a pseudo-random hash or simple random if we really want true random.
      // But let's stick to true random for now, since it was requested.
      return Math.random() - 0.5;
    }
    
    if (currentSort === 'most_liked') {
      const likesA = (window.globalLikes && window.globalLikes[a.id]) ? window.globalLikes[a.id] : 0;
      const likesB = (window.globalLikes && window.globalLikes[b.id]) ? window.globalLikes[b.id] : 0;
      if (likesA !== likesB) return likesB - likesA;
      // Fallback if likes are equal
      if (a.featured !== b.featured) return a.featured ? -1 : 1;
      const dA = new Date(a.date || 0).getTime();
      const dB = new Date(b.date || 0).getTime();
      if (dA !== dB) return dB - dA;
      return (a.name || '').localeCompare(b.name || '');
    }
    
    if (currentSort === 'newest') {
      return new Date(b.date || 0) - new Date(a.date || 0);
    }
    if (currentSort === 'oldest') {
      return new Date(a.date || 0) - new Date(b.date || 0);
    }
    if (currentSort === 'alphabetical') {
      return (a.name || '').localeCompare(b.name || '');
    }
    
    // Default Fallback (Featured -> Date -> Alphabetical) or "featured" explicit sort
    if (a.featured !== b.featured) {
      return a.featured ? -1 : 1;
    }
    // Then Date
    const dA = new Date(a.date || 0).getTime();
    const dB = new Date(b.date || 0).getTime();
    if (dA !== dB) return dB - dA;
    // Then Alphabetical
    return (a.name || '').localeCompare(b.name || '');
  });

  // Remove existing cards (keep emptyState)
  gallery.querySelectorAll('.work-card').forEach(c => c.remove());

  if (filtered.length === 0) {
    emptyState.style.display = '';
  } else {
    emptyState.style.display = 'none';
    filtered.forEach(w => {
      const card = document.createElement('div');
      card.className = 'work-card';
      card.onclick = () => openModal(w);
      const catSetting = settings.categories && settings.categories[w.cat] ? settings.categories[w.cat] : {};
      const catLabel = catSetting.name || ({game:'Game', mod:'Minecraft Mod', '3d':'3D Model'}[w.cat] || w.cat);
      
      let catIconUrl = '';
      if(catSetting.iconId && settings.icons) {
        const ic = settings.icons.find(x => x.id === catSetting.iconId);
        if(ic) catIconUrl = ic.url;
      }
      const catIcon = catIconUrl ? `<img src="${catIconUrl}" style="width:18px;height:18px;object-fit:contain;image-rendering:pixelated;">` : '';
      const subLabel = w.subcat ? w.subcat.charAt(0).toUpperCase() + w.subcat.slice(1) : '';
      const focalY = (w.imageFocal !== undefined && w.imageFocal !== null) ? w.imageFocal : 50;
      
      let toolsHtml = '';
      if(w.tools && w.tools.length > 0 && settings.icons) {
        w.tools.forEach(tid => {
          const ic = settings.icons.find(x => x.id === tid);
          if(ic) toolsHtml += `<img src="${ic.url}" title="${ic.name}" style="width:18px;height:18px;object-fit:cover;image-rendering:pixelated;border:2px solid var(--dark);background:var(--white);">`;
        });
      }

      const likesCount = (window.globalLikes && window.globalLikes[w.id]) ? window.globalLikes[w.id] : 0;
      const isLiked = (window.userLikes && window.userLikes[w.id]) ? true : false;
      const heartFill = isLiked ? 'currentColor' : 'none';
      const heartColor = isLiked ? 'var(--danger)' : 'var(--dark)';

      card.innerHTML = `
        <div class="card-thumb">
          ${w.image ? `<img src="${w.image}" alt="${w.name}" style="object-position:center ${focalY}%">` : `<div style="font-size:48px;">${catIcon||''}</div>`}
          <div class="like-btn" onclick="window.handleLikeClick(event, '${w.id}')" style="color:${heartColor};">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${heartFill}"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span style="font-family:'VT323',monospace;font-size:18px;margin-top:2px;">${likesCount}</span>
          </div>
        </div>
        <div class="card-info">
          <p class="card-name">${w.name}</p>
          <div class="card-cats" style="align-items:center;">
            <span class="cat-badge">${catIcon}${catLabel}</span>
            ${subLabel ? `<span class="cat-badge sub">${subLabel}</span>` : ''}
            ${toolsHtml ? `<div style="display:flex;gap:4px;margin-left:auto;">${toolsHtml}</div>` : ''}
          </div>
        </div>`;
      gallery.appendChild(card);
    });
  }
}

function setMainCat(cat, btn) {
  currentMainCat = cat;
  currentSubCat = 'all';

          ${l.label || 'Visit Link'}
        </a>
      `;
    });
  }

  // Render Team Button in Links Container
  const tpList = document.getElementById('teamPopupList');
  if (w.team && w.team.length > 0 && settings && settings.teams) {
    const teamMembers = w.team.map(id => settings.teams.find(t => t.id === id)).filter(Boolean);
    if (teamMembers.length > 0) {
      let teamBtnIconHtml = '';
      if (settings.teamBtnIconId && settings.icons) {
        const globalIc = settings.icons.find(x => x.id === settings.teamBtnIconId);
        if (globalIc) teamBtnIconHtml = `<img src="${globalIc.url}" style="width:24px;height:24px;object-fit:cover;image-rendering:pixelated;">`;
      }
      
      linksContainer.innerHTML += `
        <button onclick="toggleTeamPopup()" class="modal-link" style="display:inline-flex;gap:8px;align-items:center;background:#d0eaff;cursor:pointer;">
          ${teamBtnIconHtml}
          <span style="font-family:'VT323',monospace;font-size:24px;color:var(--dark);">TEAM</span>
        </button>
      `;
      if (tpList) {
        tpList.innerHTML = '';
        teamMembers.forEach(member => {
          let iconHtml = '';
          if (member.iconId && settings.icons) {
            const ic = settings.icons.find(x => x.id === member.iconId);
            if (ic) iconHtml = `<img src="${ic.url}" style="width:24px;height:24px;object-fit:cover;image-rendering:pixelated;">`;
          }
          let content = `
            <div style="display:flex; align-items:center; gap:12px; background:var(--sky4); padding:12px; border:2px solid var(--dark);">
              ${iconHtml}
              <div style="flex:1; font-family:'Press Start 2P', cursive; font-size:12px; color:var(--dark);">${member.name}</div>
            </div>
          `;
          if (member.link) {
            tpList.innerHTML += `<a href="${member.link}" target="_blank" rel="noopener" style="text-decoration:none; color:inherit; display:block;">${content}</a>`;
          } else {
            tpList.innerHTML += content;
          }
        });
      }
    }
  }

  // Center modal
  const box = document.getElementById('modalBox');
  const vw = window.innerWidth, vh = window.innerHeight;
  box.style.left = Math.max(0, (vw - Math.min(720, vw-40))/2) + 'px';
  box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Re-center after render
  requestAnimationFrame(() => {
    box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';
  });
}

// ── Image focal drag ──
function initImgDrag() {
  const wrap = document.getElementById('imgWrap');
  const img = document.getElementById('modalImgEl');
  if (!wrap || !img) return;
  let dragging = false, startY = 0, posY = 50;
  wrap.addEventListener('mousedown', e => { dragging=true; startY=e.clientY; e.preventDefault(); });
  wrap.addEventListener('touchstart', e => { dragging=true; startY=e.touches[0].clientY; }, {passive:true});
  window.addEventListener('mouseup', () => dragging=false);
  window.addEventListener('touchend', () => dragging=false);
  
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.clientY - startY) * 0.3));
    startY = e.clientY;
    img.style.objectPosition = `center ${posY}%`;
  });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.touches[0].clientY - startY) * 0.3));
    startY = e.touches[0].clientY;
    img.style.objectPosition = `center ${posY}%`;
  }, {passive:true});
}

// ── Modal drag ──
(function() {
  let draggingM=false, draggingT=false, oxM=0, oyM=0, oxT=0, oyT=0;
  
  function getEventPos(e) {
    return e.touches ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};
  }

  function handleDown(e) {
    const barM = document.getElementById('modalDragBar');
    const barT = document.getElementById('teamDragBar');
    const pos = getEventPos(e);
    
    if (barT && barT.contains(e.target)) {
      draggingT = true;
      const tbox = document.getElementById('teamModalBox');
      const mbox = document.getElementById('modalBox');
      tbox.style.zIndex = parseInt(mbox.style.zIndex || 100) + 1;
      oxT = pos.x - tbox.offsetLeft;
      oyT = pos.y - tbox.offsetTop;
      if(!e.touches) e.preventDefault();
      return;
    }
    
    if (barM && barM.contains(e.target)) {
      draggingM = true;
      const mbox = document.getElementById('modalBox');
      oxM = pos.x - mbox.offsetLeft;
      oyM = pos.y - mbox.offsetTop;
      if(!e.touches) e.preventDefault();
    }
  }

  function handleMove(e) {
    if (!draggingM && !draggingT) return;
    const pos = getEventPos(e);
    
    if (draggingT) {
      const box = document.getElementById('teamModalBox');
      const maxX = window.innerWidth - box.offsetWidth, maxY = window.innerHeight - 60;
      box.style.left = Math.max(0, Math.min(maxX, pos.x - oxT)) + 'px';
      box.style.top = Math.max(0, Math.min(maxY, pos.y - oyT)) + 'px';
    } else if (draggingM) {
      const box = document.getElementById('modalBox');
      const maxX = window.innerWidth - box.offsetWidth, maxY = window.innerHeight - 60;
      box.style.left = Math.max(0, Math.min(maxX, pos.x - oxM)) + 'px';
      box.style.top = Math.max(0, Math.min(maxY, pos.y - oyM)) + 'px';
    }
  }

  function handleUp() {
    draggingM = false;
    draggingT = false;
  }

  document.addEventListener('mousedown', handleDown);
  document.addEventListener('touchstart', handleDown, {passive:true});
  document.addEventListener('mousemove', handleMove);
  document.addEventListener('touchmove', handleMove, {passive:true});
  document.addEventListener('mouseup', handleUp);
  document.addEventListener('touchend', handleUp);
})();

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function toggleTeamPopup() {
  const tb = document.getElementById('teamModalBox');
  if (tb.style.display === 'block') {
    tb.style.display = 'none';
  } else {
    tb.style.display = 'block';
    // Center it slightly offset from the main modal
    const vw = window.innerWidth, vh = window.innerHeight;
    tb.style.left = Math.max(0, (vw - Math.min(400, vw-40))/2 + 40) + 'px';
    tb.style.top = Math.max(20, (vh - tb.offsetHeight)/2 + 40) + 'px';
  }
}
  
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('teamModalBox').style.display = 'none';
  document.body.style.overflow = '';
  disposeThreeViewer();
  document.getElementById('modalMedia').innerHTML = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModalDirect(); });

// ── Three.js 3D Viewer ──
let threeRenderer=null, threeAnimId=null;
function initThreeViewer(modelUrl) {
  const canvas = document.getElementById('threeCanvas');
  if (!canvas || typeof THREE === 'undefined') return;

  const W = canvas.clientWidth, H = canvas.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2a3a);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 1000);
  camera.position.set(0, 1.5, 4);

  threeRenderer = new THREE.WebGLRenderer({canvas, antialias:true});
  threeRenderer.setSize(W, H);
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(3,5,3); scene.add(dir);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
  fill.position.set(-3,0,-3); scene.add(fill);

  // Orbit + Pan controls
  let isDragging=false, prevX=0, prevY=0;
  let rotX=0, rotY=0, zoom=4;
  let panX=0, panY=0;  // camera pan offset
  const group = new THREE.Group(); scene.add(group);

  canvas.addEventListener('mousedown', e=>{
    isDragging=true; prevX=e.clientX; prevY=e.clientY;
    e.preventDefault();
  });
  canvas.addEventListener('touchstart', e=>{
    isDragging=true;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('mouseup', ()=>isDragging=false);
  window.addEventListener('touchend', ()=>isDragging=false);

  canvas.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    const dx=e.clientX-prevX, dy=e.clientY-prevY;
    if(e.shiftKey){
      // Pan: move camera target
      panX -= dx * 0.005 * (zoom/4);
      panY += dy * 0.005 * (zoom/4);
    } else {
      // Rotate
      rotY += dx * 0.012;
      rotX += dy * 0.012;
      rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    }
    prevX=e.clientX; prevY=e.clientY;
  });

  canvas.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    // Two-finger = pan, one-finger = rotate
    if(e.touches.length===2){
      panX -= dx*0.005; panY += dy*0.005;
    } else {
      rotY+=dx*0.012; rotX+=dy*0.012;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    }
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});

  canvas.addEventListener('wheel', e=>{
    zoom=Math.max(1,Math.min(16,zoom+e.deltaY*0.008));
    e.preventDefault();
  },{passive:false});

  // Load GLB
  const loader = new THREE.FileLoader();
  loader.setResponseType('arraybuffer');
  // Use GLTFLoader via dynamic import or inline parse
  // Fallback: load script then parse
  const script = document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(modelUrl, gltf => {
      const model = gltf.scene;
      // Auto-center and scale
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.5 / maxDim;
      model.scale.setScalar(scale);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center.multiplyScalar(scale));
      group.add(model);
    }, undefined, err => {
      console.warn('GLB load error:', err);
      // Show placeholder cube if model fails
      const geo = new THREE.BoxGeometry(1.5,1.5,1.5);
      const mat = new THREE.MeshStandardMaterial({color:0x4a9fd4,roughness:.4,metalness:.3});
      group.add(new THREE.Mesh(geo,mat));
    });
  };
  document.head.appendChild(script);

  let autoRotY = 0;
  function animate(){
    threeAnimId = requestAnimationFrame(animate);
    // Auto-slow rotate when not dragging
    if(!isDragging) autoRotY += 0.004;
    group.rotation.x = rotX;
    group.rotation.y = rotY + autoRotY;
    // Apply pan to camera
    camera.position.set(panX, 1.5 + panY, zoom);
    camera.lookAt(panX, panY, 0);
    threeRenderer.render(scene, camera);
  }
  animate();
}

function disposeThreeViewer(){
  if(threeAnimId){ cancelAnimationFrame(threeAnimId); threeAnimId=null; }
  if(threeRenderer){ threeRenderer.dispose(); threeRenderer=null; }
}

// ── Settings Modal Logic ──
window.updateSoundBtn = function(btn, isMuted) {
  if(!btn) return;
  const set = window.portfolioSettingsManager ? window.portfolioSettingsManager.getSettings() : {};
  let iconUrl = '';
  if (set && set.soundBtnIconId && set.icons) {
    const ic = set.icons.find(x => x.id === set.soundBtnIconId);
    if (ic) iconUrl = ic.url;
  }
  if (iconUrl) {
    btn.innerHTML = `<img src="${iconUrl}" style="width:24px;height:24px;object-fit:contain;image-rendering:pixelated;opacity:${isMuted ? '0.5' : '1'};filter:${isMuted ? 'grayscale(100%)' : 'none'};">`;
  } else {
    btn.textContent = isMuted ? '🔇' : '🔊';
  }
};

window.initSoundBtns = function() {
  const btns = ['masterMuteBtn', 'musicMuteBtn', 'sfxMuteBtn', 'bgmTogglePortfolio'];
  btns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) {
      const isMuted = btn.textContent.includes('🔇') || btn.innerHTML.includes('opacity: 0.5') || btn.innerHTML.includes('opacity:0.5');
      window.updateSoundBtn(btn, isMuted);
    }
  });
};

function openSettingsModal() {
  const modal = document.getElementById('settingsModal');
  const set = window.portfolioSettingsManager.getSettings();
  
  document.getElementById('setTheme').value = set.theme;
  document.getElementById('setGraphics').value = set.graphics;
  document.getElementById('setMasterVol').value = set.masterVolume;
  document.getElementById('setMusicVol').value = set.musicVolume;
  document.getElementById('setSfxVol').value = set.sfxVolume;

  modal.classList.add('open');
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettingsUI() {
  const newSet = {
    theme: document.getElementById('setTheme').value,
    graphics: document.getElementById('setGraphics').value,
    masterVolume: parseInt(document.getElementById('setMasterVol').value, 10),
    musicVolume: parseInt(document.getElementById('setMusicVol').value, 10),
    sfxVolume: parseInt(document.getElementById('setSfxVol').value, 10)
  };
  window.portfolioSettingsManager.updateSettings(newSet);
  // Sync volumes to audio engine in real-time
  if (window.portfolioAudioManager && window.portfolioAudioManager.setVolumes) {
    window.portfolioAudioManager.setVolumes({
      master: newSet.masterVolume,
      music:  newSet.musicVolume,
      sfx:    newSet.sfxVolume
    });
  }
}

// ── BGM Toggle for Portfolio Page ──
let _bgmOn = false;
window.togglePortfolioBGM = function() {
  if (!window.portfolioAudioManager) return;
  const isNowOn = window.portfolioAudioManager.togglePortfolioBGM();
  _bgmOn = isNowOn;
  const btn = document.getElementById('bgmTogglePortfolio');
  if (btn) {
    if(window.updateSoundBtn) window.updateSoundBtn(btn, !_bgmOn);
    else btn.textContent = _bgmOn ? '🔊' : '🔇';
  }
};
