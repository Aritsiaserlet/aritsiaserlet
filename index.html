<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aritsia — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky1:#4a9fd4;--sky2:#7ec8e8;--sky3:#aaddee;--sky4:#cceeff;
  --gold:#e8c87a;--gold-d:#c8a040;--gold-l:#f5e0a0;
  --dark:#1a2a3a;--mid:#2c4a6a;--light:#e8f4fc;
  --white:rgba(255,255,255,0.88);--glass:rgba(255,255,255,0.45);
  --glass2:rgba(255,255,255,0.62);
}
html,body{min-height:100%;overflow-x:hidden}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(175deg,var(--sky1) 0%,var(--sky2) 28%,var(--sky3) 58%,var(--sky4) 100%);
  min-height:100vh;position:relative;
}

/* ── Wind lines ── */
.wind-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.55}

/* ── Clouds ── */
.clouds{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.cloud{position:absolute;background:rgba(255,255,255,0.84);border-radius:60px;animation:drift linear infinite}
.cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
.c1{width:260px;height:62px;top:6%;left:-280px;animation-duration:58s;animation-delay:0s}
.c1::before{width:100px;height:88px;top:-46px;left:36px}
.c1::after{width:80px;height:70px;top:-34px;left:120px}
.c2{width:180px;height:44px;top:16%;left:-200px;animation-duration:74s;animation-delay:-22s;opacity:.7}
.c2::before{width:75px;height:65px;top:-32px;left:22px}
.c2::after{width:60px;height:52px;top:-24px;left:90px}
.c3{width:320px;height:72px;top:32%;left:-340px;animation-duration:88s;animation-delay:-40s;opacity:.82}
.c3::before{width:128px;height:100px;top:-54px;left:60px}
.c3::after{width:96px;height:80px;top:-40px;left:160px}
.c4{width:140px;height:36px;top:52%;left:-160px;animation-duration:62s;animation-delay:-12s;opacity:.6}
.c4::before{width:58px;height:52px;top:-28px;left:18px}
.c4::after{width:46px;height:40px;top:-20px;left:70px}
.c5{width:220px;height:54px;top:70%;left:-240px;animation-duration:96s;animation-delay:-55s;opacity:.72}
.c5::before{width:88px;height:78px;top:-40px;left:45px}
.c5::after{width:70px;height:58px;top:-30px;left:120px}
.c6{width:110px;height:30px;top:4%;left:-130px;animation-duration:48s;animation-delay:-8s;opacity:.55}
.c6::before{width:46px;height:42px;top:-22px;left:14px}
.c6::after{width:36px;height:32px;top:-16px;left:56px}
.c7{width:190px;height:48px;top:85%;left:-210px;animation-duration:70s;animation-delay:-30s;opacity:.65}
.c7::before{width:80px;height:70px;top:-36px;left:30px}
.c7::after{width:62px;height:55px;top:-26px;left:100px}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 500px))}}

/* ── Falling leaves / debris (wind particles) ── */
.particle{
  position:fixed;pointer-events:none;z-index:2;
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.6);
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translate(0,0) rotate(0deg);opacity:0}
  10%{opacity:1}
  90%{opacity:0.6}
  100%{transform:translate(var(--dx),100vh) rotate(720deg);opacity:0}
}

/* ── Nav ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border-bottom:0.5px solid rgba(255,255,255,0.4);
}
.nav-logo{font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;color:var(--dark);font-weight:700}
.nav-right{display:flex;gap:10px;align-items:center}
.nav-btn{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;
  color:var(--mid);border:1.5px solid rgba(44,74,106,0.35);
  background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);
  padding:7px 16px;border-radius:4px;cursor:pointer;
  text-decoration:none;transition:all .2s;
}
.nav-btn:hover{background:rgba(255,255,255,0.82);border-color:var(--gold-d)}
.nav-btn.play{border-color:var(--gold);color:var(--dark);display:flex;align-items:center;gap:6px}
.nav-btn.admin{font-size:10px;opacity:.7}

/* ── Page ── */
.page{
  position:relative;z-index:5;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:100px 20px 100px;
  gap:0;
}

/* ── Profile ── */
.profile-wrap{
  display:flex;flex-direction:column;align-items:center;
  animation:fadeUp .9s ease both;
  margin-bottom:36px;
}
.avatar-ring{
  width:150px;height:150px;border-radius:50%;
  background:conic-gradient(var(--gold-l),var(--gold),var(--gold-d),var(--gold),var(--gold-l));
  padding:4px;margin-bottom:24px;
  box-shadow:0 8px 40px rgba(80,140,200,.3),0 0 0 2px rgba(255,255,255,.7);
  animation:spin-ring 8s linear infinite;
}
@keyframes spin-ring{to{filter:hue-rotate(30deg)}}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#a8d4f0,#c8eaf8,#90c4e8);
  display:flex;align-items:center;justify-content:center;
  font-size:58px;
}
.avatar-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.name{
  font-family:'Cinzel',serif;font-size:46px;font-weight:700;
  color:var(--dark);letter-spacing:5px;
  text-shadow:0 2px 16px rgba(255,255,255,.8),0 1px 4px rgba(30,60,100,.12);
  margin-bottom:10px;line-height:1;
}
.role-tag{
  font-size:12px;font-weight:700;letter-spacing:2px;
  color:var(--mid);background:var(--glass2);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.75);
  padding:5px 22px;border-radius:30px;margin-bottom:28px;
  text-transform:uppercase;
}

/* ── Social ── */
.social-links{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  margin-bottom:52px;
  animation:fadeUp .9s .12s ease both;
}
.social-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:30px;font-size:13px;font-weight:600;
  text-decoration:none;
  border:1.5px solid rgba(255,255,255,.72);
  background:var(--glass);backdrop-filter:blur(12px);
  color:var(--mid);
  transition:transform .18s,background .18s,box-shadow .18s;
  box-shadow:0 2px 12px rgba(80,140,200,.14);
}
.social-btn:hover{transform:translateY(-3px);background:rgba(255,255,255,.85);box-shadow:0 6px 22px rgba(80,140,200,.25)}
.social-btn svg{width:16px;height:16px;flex-shrink:0}

/* ── Works section ── */
.works-section{
  width:100%;max-width:900px;
  animation:fadeUp .9s .28s ease both;
}
.section-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;justify-content:center;
}
.s-line{flex:1;max-width:100px;height:1px;background:linear-gradient(90deg,transparent,rgba(30,60,100,.28))}
.s-line.r{background:linear-gradient(90deg,rgba(30,60,100,.28),transparent)}
.s-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--mid);text-transform:uppercase}

/* ── Filter ── */
.filter-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center}
.filter-label{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:1px;opacity:.6;margin-right:4px;white-space:nowrap}
.tab{
  font-size:11px;font-weight:700;letter-spacing:.8px;
  padding:5px 16px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.6);
  background:rgba(255,255,255,.3);color:var(--mid);
  cursor:pointer;transition:all .18s;backdrop-filter:blur(6px);
  white-space:nowrap;
}
.tab:hover,.tab.active{background:rgba(255,255,255,.88);border-color:var(--gold);color:var(--dark)}
.subtab{font-size:10px;padding:4px 12px;border-radius:16px;opacity:.8}
.subtab.active{opacity:1}
.sub-row{display:none;gap:6px;flex-wrap:wrap;justify-content:center}
.sub-row.visible{display:flex}

/* ── Gallery ── */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
}
.work-card{
  border-radius:14px;overflow:hidden;
  border:1.5px solid rgba(255,255,255,.72);
  background:var(--glass2);backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(80,140,200,.16);
  cursor:pointer;transition:transform .22s,box-shadow .22s;
}
.work-card:hover{transform:translateY(-5px);box-shadow:0 12px 34px rgba(80,140,200,.26)}
.work-card.hidden{display:none}
.card-thumb{
  width:100%;aspect-ratio:16/10;
  background:linear-gradient(135deg,#b8dff0,#d6f0f8);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;overflow:hidden;position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-info{padding:12px 14px}
.card-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:6px}
.card-cats{display:flex;gap:5px;flex-wrap:wrap}
.cat-badge{
  font-size:10px;font-weight:700;letter-spacing:.4px;
  padding:2px 10px;border-radius:10px;
  background:rgba(44,74,106,.1);color:var(--mid);
}
.cat-badge.sub{background:rgba(232,200,122,.25);color:var(--gold-d)}

/* ── Empty state ── */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:48px;color:rgba(44,74,106,.5);font-size:14px;
}

/* ── Play btn ── */
.play-fixed{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20}
.play-btn{
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;
  color:var(--dark);background:rgba(255,255,255,.78);
  backdrop-filter:blur(14px);border:2px solid var(--gold);
  padding:12px 38px;border-radius:50px;cursor:pointer;
  text-decoration:none;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 22px rgba(200,160,64,.22);
  transition:all .2s;
}
.play-btn:hover{background:rgba(255,255,255,.96);transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,160,64,.32)}

@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(20,40,65,0.55);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,.85);border-radius:20px;
  width:calc(100vw - 40px);max-width:720px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(30,60,100,.25);
  position:absolute;
  transform:scale(.97);transition:transform .28s;
  user-select:none;
}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-drag-bar{
  position:absolute;top:0;left:0;right:0;height:44px;
  cursor:grab;z-index:3;border-radius:20px 20px 0 0;
  display:flex;align-items:center;justify-content:center;
}
.modal-drag-bar:active{cursor:grabbing}
.modal-drag-dot{width:36px;height:4px;border-radius:2px;background:rgba(44,74,106,.2);margin-top:8px}
.modal-close{
  position:absolute;top:10px;right:14px;
  background:rgba(44,74,106,.12);border:none;border-radius:50%;
  width:32px;height:32px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);transition:background .2s;z-index:4;
}
.modal-close:hover{background:rgba(44,74,106,.22)}
.modal-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:18px 18px 0 0;position:relative;cursor:ns-resize}
.modal-img{width:100%;height:100%;object-fit:cover;object-position:center 50%;display:block;transition:object-position .1s}
.modal-img-placeholder{
  width:100%;aspect-ratio:16/9;
  background:linear-gradient(135deg,#b8dff0,#d6f0f8);
  border-radius:18px 18px 0 0;
  display:flex;align-items:center;justify-content:center;font-size:64px;
}
.modal-viewer{
  width:100%;aspect-ratio:16/9;border-radius:18px 18px 0 0;
  background:#1a2a3a;display:block;border:none;
}
.modal-body{padding:22px 26px 26px}
.modal-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.modal-desc{font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:18px;white-space:pre-wrap}
.modal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:10px;
  border:2px solid var(--gold);background:rgba(232,200,122,.2);
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:1.5px;
  color:var(--dark);text-decoration:none;transition:all .2s;
}
.modal-link:hover{background:rgba(232,200,122,.5);transform:translateY(-1px)}
.viewer-hint{font-size:11px;color:rgba(44,74,106,.5);text-align:center;padding:6px 0 0;letter-spacing:.5px}

</style>
</head>

<script>
// ── Wind canvas effect ──
const canvas = document.getElementById('windCanvas');
const ctx = canvas.getContext('2d');
let W, H, lines = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function randBetween(a, b) { return a + Math.random() * (b - a); }

function createLine() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    len: randBetween(60, 200),
    speed: randBetween(6, 16),
    opacity: randBetween(0.05, 0.25),
    angle: randBetween(-0.15, 0.15), // mostly horizontal
    width: randBetween(0.5, 1.5),
    life: 0, maxLife: randBetween(40, 120)
  };
}

for (let i = 0; i < 35; i++) {
  let l = createLine();
  l.life = Math.random() * l.maxLife;
  lines.push(l);
}

function animateWind() {
  ctx.clearRect(0, 0, W, H);
  lines.forEach((l, i) => {
    l.x += l.speed;
    l.y += Math.sin(l.angle) * l.speed * 0.3;
    l.life++;
    const progress = l.life / l.maxLife;
    const fade = progress < 0.2 ? progress / 0.2 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${l.opacity * fade})`;
    ctx.lineWidth = l.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const ex = l.x + Math.cos(l.angle) * l.len;
    const ey = l.y + Math.sin(l.angle) * l.len;
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.restore();
    if (l.x > W + 220 || l.life >= l.maxLife) lines[i] = createLine();
  });
  requestAnimationFrame(animateWind);
}
animateWind();

// ── Works data from GitHub ──
let works = [];
let currentMainCat = 'all';
let currentSubCat = 'all';

const GH_USER = 'Aritsiaserlet';
const GH_REPO = 'aritsiaserlet';
const WORKS_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/works.json`;

async function loadWorks() {
  try {
    const r = await fetch(WORKS_URL + '?t=' + Date.now());
    if (r.ok) works = await r.json();
    else works = [];
  } catch(e) { works = []; }
  renderGallery();
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('emptyState');

  const filtered = works.filter(w => {
    if (currentMainCat !== 'all' && w.cat !== currentMainCat) return false;
    if (currentMainCat === '3d' && currentSubCat !== 'all' && w.subcat !== currentSubCat) return false;
    return true;
  });

  // Remove existing cards (keep emptyState)
  gallery.querySelectorAll('.work-card').forEach(c => c.remove());

  if (filtered.length === 0) {
    emptyState.style.display = '';
  } else {
    emptyState.style.display = 'none';
    filtered.forEach(w => {
      const card = document.createElement('div');
      card.className = 'work-card';
      card.onclick = () => openModal(w);
      const catEmoji = {game:'🎮', mod:'⚙️', '3d':'🧊'}[w.cat] || '📁';
      const catLabel = {game:'Game', mod:'Minecraft Mod', '3d':'3D Model'}[w.cat] || w.cat;
      const subLabel = w.subcat ? w.subcat.charAt(0).toUpperCase() + w.subcat.slice(1) : '';
      const focalY = (w.imageFocal !== undefined && w.imageFocal !== null) ? w.imageFocal : 50;
      card.innerHTML = `
        <div class="card-thumb">
          ${w.image ? `<img src="${w.image}" alt="${w.name}" style="object-position:center ${focalY}%">` : catEmoji}
        </div>
        <div class="card-info">
          <p class="card-name">${w.name}</p>
          <div class="card-cats">
            <span class="cat-badge">${catEmoji} ${catLabel}</span>
            ${subLabel ? `<span class="cat-badge sub">${subLabel}</span>` : ''}
          </div>
        </div>`;
      gallery.appendChild(card);
    });
  }
}

function setMainCat(cat, btn) {
  currentMainCat = cat;
  currentSubCat = 'all';
  document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const subRow = document.getElementById('subRow');
  if (cat === '3d') {
    subRow.classList.add('visible');
    subRow.querySelectorAll('.subtab').forEach(t => t.classList.remove('active'));
    subRow.querySelector('[data-sub="all"]').classList.add('active');
  } else {
    subRow.classList.remove('visible');
  }
  renderGallery();
}

function setSubCat(sub, btn) {
  currentSubCat = sub;
  document.querySelectorAll('#subRow .subtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

loadWorks();

// ── Modal ──
function openModal(w) {
  const catEmoji = {game:'🎮', mod:'⚙️', '3d':'🧊'}[w.cat] || '📁';
  const catLabel = {game:'Game', mod:'Minecraft Mod', '3d':'3D Model'}[w.cat] || w.cat;
  const subLabel = w.subcat ? w.subcat.charAt(0).toUpperCase() + w.subcat.slice(1) : '';

  // Media area
  const media = document.getElementById('modalMedia');
  if (w.cat === '3d' && w.model) {
    media.innerHTML = '<canvas class="modal-viewer" id="threeCanvas"></canvas><p class="viewer-hint">🖱 Drag = Rotate &nbsp;·&nbsp; Shift+Drag = Pan &nbsp;·&nbsp; Scroll = Zoom</p>';
    setTimeout(() => initThreeViewer(w.model), 80);
  } else if (w.image) {
    media.innerHTML = `<div class="modal-img-wrap" id="imgWrap"><img class="modal-img" id="modalImgEl" src="${w.image}" alt="${w.name}" style="object-position:center ${w.imageFocal||50}%"></div><p class="viewer-hint">↕ Drag image up/down to adjust</p>`;
    initImgDrag();
  } else {
    media.innerHTML = `<div class="modal-img-placeholder">${catEmoji}</div>`;
  }

  document.getElementById('modalTitle').textContent = w.name;
  document.getElementById('modalDesc').textContent = w.desc || '';

  const badges = document.getElementById('modalBadges');
  badges.innerHTML = `<span class="cat-badge">${catEmoji} ${catLabel}</span>`;
  if (subLabel) badges.innerHTML += `<span class="cat-badge sub">${subLabel}</span>`;

  const link = document.getElementById('modalLink');
  if (w.link) { link.href = w.link; link.style.display = 'inline-flex'; }
  else link.style.display = 'none';

  // Center modal
  const box = document.getElementById('modalBox');
  const vw = window.innerWidth, vh = window.innerHeight;
  box.style.left = Math.max(0, (vw - Math.min(720, vw-40))/2) + 'px';
  box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Re-center after render
  requestAnimationFrame(() => {
    box.style.top = Math.max(20, (vh - box.offsetHeight)/2) + 'px';
  });
}

// ── Image focal drag ──
function initImgDrag() {
  const wrap = document.getElementById('imgWrap');
  const img = document.getElementById('modalImgEl');
  if (!wrap || !img) return;
  let dragging = false, startY = 0, posY = 50;
  wrap.addEventListener('mousedown', e => { dragging=true; startY=e.clientY; e.preventDefault(); });
  wrap.addEventListener('touchstart', e => { dragging=true; startY=e.touches[0].clientY; }, {passive:true});
  window.addEventListener('mouseup', () => dragging=false);
  window.addEventListener('touchend', () => dragging=false);
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.clientY - startY) * 0.3));
    startY = e.clientY;
    img.style.objectPosition = `center ${posY}%`;
  });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    posY = Math.max(0, Math.min(100, posY - (e.touches[0].clientY - startY) * 0.3));
    startY = e.touches[0].clientY;
    img.style.objectPosition = `center ${posY}%`;
  }, {passive:true});
}

// ── Modal drag ──
(function() {
  let dragging=false, ox=0, oy=0;
  document.addEventListener('mousedown', e => {
    const bar = document.getElementById('modalDragBar');
    if (!bar || !bar.contains(e.target)) return;
    dragging=true;
    const box=document.getElementById('modalBox');
    ox=e.clientX-box.offsetLeft; oy=e.clientY-box.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('touchstart', e => {
    const bar = document.getElementById('modalDragBar');
    if (!bar || !bar.contains(e.target)) return;
    dragging=true;
    const box=document.getElementById('modalBox');
    ox=e.touches[0].clientX-box.offsetLeft; oy=e.touches[0].clientY-box.offsetTop;
  }, {passive:true});
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const box=document.getElementById('modalBox');
    const maxX=window.innerWidth-box.offsetWidth, maxY=window.innerHeight-60;
    box.style.left=Math.max(0,Math.min(maxX,e.clientX-ox))+'px';
    box.style.top=Math.max(0,Math.min(maxY,e.clientY-oy))+'px';
  });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const box=document.getElementById('modalBox');
    const maxX=window.innerWidth-box.offsetWidth, maxY=window.innerHeight-60;
    box.style.left=Math.max(0,Math.min(maxX,e.touches[0].clientX-ox))+'px';
    box.style.top=Math.max(0,Math.min(maxY,e.touches[0].clientY-oy))+'px';
  }, {passive:true});
  document.addEventListener('mouseup', () => dragging=false);
  document.addEventListener('touchend', () => dragging=false);
})();

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  disposeThreeViewer();
  document.getElementById('modalMedia').innerHTML = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModalDirect(); });

// ── Three.js 3D Viewer ──
let threeRenderer=null, threeAnimId=null;
function initThreeViewer(modelUrl) {
  const canvas = document.getElementById('threeCanvas');
  if (!canvas || typeof THREE === 'undefined') return;

  const W = canvas.clientWidth, H = canvas.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2a3a);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 1000);
  camera.position.set(0, 1.5, 4);

  threeRenderer = new THREE.WebGLRenderer({canvas, antialias:true});
  threeRenderer.setSize(W, H);
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(3,5,3); scene.add(dir);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
  fill.position.set(-3,0,-3); scene.add(fill);

  // Orbit + Pan controls
  let isDragging=false, prevX=0, prevY=0;
  let rotX=0, rotY=0, zoom=4;
  let panX=0, panY=0;  // camera pan offset
  const group = new THREE.Group(); scene.add(group);

  canvas.addEventListener('mousedown', e=>{
    isDragging=true; prevX=e.clientX; prevY=e.clientY;
    e.preventDefault();
  });
  canvas.addEventListener('touchstart', e=>{
    isDragging=true;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});
  window.addEventListener('mouseup', ()=>isDragging=false);
  window.addEventListener('touchend', ()=>isDragging=false);

  canvas.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    const dx=e.clientX-prevX, dy=e.clientY-prevY;
    if(e.shiftKey){
      // Pan: move camera target
      panX -= dx * 0.005 * (zoom/4);
      panY += dy * 0.005 * (zoom/4);
    } else {
      // Rotate
      rotY += dx * 0.012;
      rotX += dy * 0.012;
      rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    }
    prevX=e.clientX; prevY=e.clientY;
  });

  canvas.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    // Two-finger = pan, one-finger = rotate
    if(e.touches.length===2){
      panX -= dx*0.005; panY += dy*0.005;
    } else {
      rotY+=dx*0.012; rotX+=dy*0.012;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    }
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  },{passive:true});

  canvas.addEventListener('wheel', e=>{
    zoom=Math.max(1,Math.min(16,zoom+e.deltaY*0.008));
    e.preventDefault();
  },{passive:false});

  // Load GLB
  const loader = new THREE.FileLoader();
  loader.setResponseType('arraybuffer');
  // Use GLTFLoader via dynamic import or inline parse
  // Fallback: load script then parse
  const script = document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(modelUrl, gltf => {
      const model = gltf.scene;
      // Auto-center and scale
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.5 / maxDim;
      model.scale.setScalar(scale);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center.multiplyScalar(scale));
      group.add(model);
    }, undefined, err => {
      console.warn('GLB load error:', err);
      // Show placeholder cube if model fails
      const geo = new THREE.BoxGeometry(1.5,1.5,1.5);
      const mat = new THREE.MeshStandardMaterial({color:0x4a9fd4,roughness:.4,metalness:.3});
      group.add(new THREE.Mesh(geo,mat));
    });
  };
  document.head.appendChild(script);

  let autoRotY = 0;
  function animate(){
    threeAnimId = requestAnimationFrame(animate);
    // Auto-slow rotate when not dragging
    if(!isDragging) autoRotY += 0.004;
    group.rotation.x = rotX;
    group.rotation.y = rotY + autoRotY;
    // Apply pan to camera
    camera.position.set(panX, 1.5 + panY, zoom);
    camera.lookAt(panX, panY, 0);
    threeRenderer.render(scene, camera);
  }
  animate();
}

function disposeThreeViewer(){
  if(threeAnimId){ cancelAnimationFrame(threeAnimId); threeAnimId=null; }
  if(threeRenderer){ threeRenderer.dispose(); threeRenderer=null; }
}

</script>
